services:
  backend:
    build:
      context: ./internal-controls-testing
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/ict_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - MAIL_USERNAME=
      - MAIL_PASSWORD=
      - JWT_SECRET=thisisaverylongandsecuresecretkeyfortesting12345
      - JWT_EXPIRATION=86400000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    restart: on-failure
    networks:
      - ict-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - ict-net

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ict_db
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ict-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ict-net

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ict-net

volumes:
  mysql-data:

networks:
  ict-net:
    driver: bridge
